services:
  - type: web
    name: zirve-app-node
    runtime: node
    nodeVersion: 20.19.0
    buildCommand: npm install --legacy-peer-deps --include=dev && npm run build
    startCommand: npm start
    plan: free
    region: oregon
    envVars:
      - key: NODE_VERSION
        value: "20.19.0"
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
